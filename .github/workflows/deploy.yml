name: CI/CD - Production Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: fixlab-main/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: fixlab-main

      - name: Run Lint / Type Check
        run: npm run lint
        working-directory: fixlab-main

      - name: Build Project
        run: npm run build
        working-directory: fixlab-main

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --token "${{ secrets.FIREBASE_TOKEN }}" --only hosting
        working-directory: fixlab-main

